# Plugin Management
# These lines configure plugins for tmux, including visual themes and functionality.
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jtmcginty/tmux-session-dots'
set -g @plugin 'Morantron/tmux-fingers'

# Terminal Settings
# These settings define the default terminal type and terminal capabilities.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Catppuccin Plugin Configuration
# This section customizes the appearance of tmux using the catppuccin plugin.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"

set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_status_style "custom"

set -g @catppuccin_window_text "#[fg=#{@thm_surface_2}]#W"
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_number "#[fg=#{@thm_surface_2} bold]#(~/.config/tmux/scripts/number.sh #I)"
set -g @catppuccin_window_number_color "default"

set -g @catppuccin_window_current_text "#[fg=#{@thm_fg} bold]#W"
set -g @catppuccin_window_current_text_color "default"
set -g @catppuccin_window_current_number "#[fg=#{@thm_peach} bold]#(~/.config/tmux/scripts/number.sh #I)"
set -g @catppuccin_window_current_number_color "default"

# set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"

# tmux-session-dots Plugin Configuration
set -g @session-dots-color "#{@thm_fg}"
set -g @session-dots-active "👻 "
set -g @session-dots-inactive "● "

# Border and Pane Settings
# These settings customize the appearance of pane borders and active panes.
# setw -g pane-border-status top

# Status Bar Position and Appearance
# These settings define the appearance and position of the tmux status bar.
set -g status-position top
set -g status-justify 'absolute-centre'

set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#{@thm_mauve} bold]󱗜 PREFIX ,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow} bold]󱗜 COPY ,#[fg=#{@thm_green} bold]󱗜 NORMAL }}"
set -ga status-left "#[fg=#{@thm_red} bold] 󰙀 #S "
set -ga status-left "#[fg=#{@thm_blue} bold] 󰉖 #{b:pane_current_path} "

set -g status-right-length 100
set -g status-right "#{session_dots}"
set -ga status-right "#[fg=#{@thm_mauve}] 󰄉 #(uptime | sed 's/^[^,]*up *//; s/, *[[:digit:]]* user.*//; s/ day.*, */d /; s/ hr\\(s*\\).*/h/; s/ min\\(s*\\).*/m/; s/ sec\\(s*\\).*/s/; s/\\([0-9]\\{1,2\\}\\):\\([0-9]\\{1,2\\}\\)/\\1h \\2m/;') "
set -ga status-right "#[fg=#{@thm_lavender}] 󰅐 %H:%M %p "
set -ga status-right "#[fg=#{@thm_pink}] 󰃭 %a %d"

# General Settings and Key Bindings
# These configurations define general behaviors and key bindings for tmux.
set -g mouse on
set -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1

# Key Bindings for Window and Pane Management
# These bindings simplify creating and splitting windows and panes.
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Name of the new window: " "new-window -n '%%' -c '#{pane_current_path}'"
bind S command-prompt -p "Name of the new session: " "new-session -s '%%'"
bind h split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"
bind f display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "spf"
bind e display-popup -w 80% -h 80% -E "tmux capture-pane -Jp -S -1000 | helix -"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
